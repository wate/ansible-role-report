# code: language=ansible
---
- name: Find platform variable file
  ansible.builtin.set_fact:
    variable_file: "{{ lookup('first_found', params, errors='ignore') }}"
  vars:
    params:
      files:
        - "{{ ansible_facts.os_family }}/{{ ansible_facts.distribution }}/{{ ansible_facts.distribution_major_version }}.yml"
        - "{{ ansible_facts.os_family }}/{{ ansible_facts.distribution }}.yml"
        - "{{ ansible_facts.os_family }}.yml"
      paths:
        - vars
  tags: role_report_include_vars
- name: Include variable file
  ansible.builtin.include_vars:
    file: "{{ variable_file }}"
  when:
    - variable_file is not none
    - variable_file | length > 0
  tags: role_report_include_vars
- name: Import prepare task
  ansible.builtin.import_tasks:
    file: prepare.yml
  tags: role_report_prepare
- name: Import dependency task
  ansible.builtin.import_tasks:
    file: dependency.yml
  tags: role_report_dependency
- name: Import basic report task
  ansible.builtin.import_tasks:
    file: basic.yml
  tags: role_report_basic
- name: Import package report task
  ansible.builtin.import_tasks:
    file: package.yml
  tags: role_report_package
- name: Import listen port report task
  ansible.builtin.import_tasks:
    file: port.yml
  tags: role_report_port
- name: Import disk report task
  ansible.builtin.import_tasks:
    file: disk.yml
  tags: role_report_disk
- name: Import traffic report task
  ansible.builtin.import_tasks:
    file: traffic.yml
  tags: role_report_traffic
- name: Import user/group report task
  ansible.builtin.import_tasks:
    file: user_group.yml
  tags:
    - role_report_user
    - role_report_group
    - role_report_user_group
- name: Import file report task
  ansible.builtin.import_tasks:
    file: file.yml
  tags: role_report_file
