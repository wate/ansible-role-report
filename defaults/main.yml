---
## -------------
## レポートの出力先ディレクトリ
## レポートはコントロールノード側に作成されます
## ※このディレクトリ内に各ホスト毎のディレクトリを作成しレポートを出力します
## -------------
report_dir: ./report

## -------------
## プラットフォーム情報（オプション）
## レポートの上部に表示されます
## -------------
# report_platform: 本番環境
# report_repository_info: https://github.com/example/repo

## -------------
## 脆弱性スキャン設定
## osv-scannerの設定ファイル内容（TOMLフォーマット）
## 詳細: https://google.github.io/osv-scanner/configuration/
## 例: IgnoredVulns, PackageOverridesなどを設定可能
## -------------
# report_osv_scanner_config: |
#   [[IgnoredVulns]]
#   id = "DEBIAN-CVE-2011-3374"
#   reason = "No ssh servers are connected"
#
#   [[PackageOverrides]]
#   name = "lib"
#   ignore = true

## -------------
## サービスの稼働状況のフィルター変数
## -------------
report_service:
  ## サービスの取得元
  filter_sources:
    - systemd
  ## 稼働中を表すステート
  filter_running_states:
    - running
  ## 除外するステータス
  reject_statuses:
    - static
    - unknown

## -------------
## ディスク使用量を調査するディレクトリのリスト
## -------------
report_disk_usage_dirs:
  - /home
  - /var/log
  - /var/spool
  - /var/tmp

## -------------
## 検索対象ファイル情報のリスト
## -------------
report_file_searches:
  - name: ログファイル
    path: /var/log
    patterns:
      - "*.log*"
    excludes:
      - "*.gz"

## --------------------------
## インストールするjcのバージョン
## --------------------------
jc_version: latest

## --------------------------
## インストールするosv-scannerのバージョン
## --------------------------
osv_scanner_version: latest
