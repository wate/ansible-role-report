---
## -------------
## レポートの出力先ディレクトリ
## レポートはコントロールノード側に作成されます
## ※このディレクトリ内に各ホスト毎のディレクトリを作成しレポートを出力します
## -------------
report_dir: ./report

## -------------
## プラットフォーム情報（オプション）
## レポートの上部に表示されます
## -------------
# report_platform: 本番環境
# report_repository_info: https://github.com/example/repo

## -------------
## サービスの稼働状況のフィルター変数
## -------------
report_service:
  ## サービスの取得元
  filter_sources:
    - systemd
  ## 稼働中を表すステート
  filter_running_states:
    - running
  ## 除外するステータス
  reject_statuses:
    - static
    - unknown

## -------------
## ディスク使用量を調査するディレクトリのリスト
## -------------
report_disk_usage_dirs: []
# report_disk_usage_dirs:
#   - /home
#   - /var/www
#   - /var/log
#   - /var/spool

## -------------
## 検索対象ファイル情報のリスト
## -------------
report_file_searches: []
# report_file_searches:
#   - name: ログファイル
#     path: /var/log
#     size: 100M
#     patterns:
#       - "*.log*"
#     excludes:
#       - "*.gz"
#   - name: バックアップファイル
#     path: /backup/data
#     age: 7d

## --------------------------
## インストールするjcのバージョン
## --------------------------
jc_version: latest

## --------------------------
## インストールするosv-scannerのバージョン
## --------------------------
osv_scanner_version: latest
